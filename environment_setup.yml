name: nrtoxpred
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - rdkit=2022.09.5   # pinned — newer versions have breaking API changes
  - numpy=1.23        # scikit-learn 0.23.2 is incompatible with numpy >= 1.24
  - pip
  - pip:
    - molvs
    - scikit-learn==0.23.2
    - mlens
    - pandas
    - scipy
    - openpyxl
    - Pillow
    - huggingface_hub
    - syGMa
